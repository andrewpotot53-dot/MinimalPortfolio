<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport"content="width=device-width,initial-scale=1.0">
    <title>contact form</title>
    </head>
   <body style="margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(45deg, lightpink, peachpuff, lightskyblue);font-family:sans-serif;">
       <div style="width:550px;border:1px solid;border-radius:30px;padding:40px;backdrop-filter:blur(30px);webkit-backdrop-filter:blur(30px);box-shadow:0 8px 62px rgba(0,0,0,0.2);text-align:center;">
           
           <h1 style="color:silver;font-size:25px;">Contact form</h1><br><br>
           <div style="position:relative;margin-bottom:30px;">
        <label style="position:absolute;top:-12px;left:15px;font-size:13px;font-weight:bold;border:1px solid rgba(225,225,225,0.5);background:white;border-radius:15px;padding:2px 12px;">Enter your Full name</label>
        
        <input type="text"  style="width:100%;border:1px solid rgba(225,225,225,0.5);border-radius:25px;padding:10px;background:rgba(225,225,225,0.5);">
           </div>
        <div style="position:relative;margin-bottom:30px;">
        <label style="position:absolute;top:-12px;left:15px;font-size:13px;font-weight:bold;border:1px solid rgba(225,225,225,0.5);background:white;border-radius:15px;padding:2px 12px;">email</label>
        <input type="email"  style="width:100%;border:1px solid rgba(225,225,225,0.5);border-radius:25px;padding:10px ;background:rgba(225,225,225,0.5);">
        </div>
     <div style="position:relative;margin-bottom:30px;">
        
        <label style="position:absolute;top:-12px;left:15px;font-size:13px;font-weight:bold;border:1px solid rgba(225,225,225,0.5);background:white;border-radius:15px;padding:2px 12px;">message</label>
        <input type="text"  style="width:100%;border:1px solid rgba(225,225,225,0.5);border-radius:25px;padding:40px 10px;background:rgba(225,225,225,0.5);">
        <div style="display:flex;">
        
     <label><input type="radio">Male</label>
    
     <label><input type="radio">Female</label>
     </div><br><br>
     
           <button style="width:100%;border:2px solid rgba(225,225,225,0.2);border-radius:30px;padding:10px 40px;cursor:pointer;">submit</button>
       

    </div>
   </body>
   </html>
