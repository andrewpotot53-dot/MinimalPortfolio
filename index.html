<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title></title>
    
<style>

*{
    margin:0;
    padding:0;
    font-family:monospace;
    line-height:1.6;
}
body{
    background:#f4f4f9;
}
header{
    text-align:center;
    background:#2c3e50;
    color:#fff;
    padding:2rem;
}
nav{
    position:sticky;
    z-index:1000;
    top:0;
}
nav ul{
display:flex;
justify-content:center;
    background:linear-gradient(45deg, grey, peachpuff, lightskyblue, purple);
    padding:1rem;
    list-style:none;
    
}
nav ul li a{
text-decoration:none;
color:#fff;
padding:1rem;
margin:0 15px;
}
nav ul li a:hover{
    color:#000;
}
#about{
    text-align:center;
}
.text{
    width:90ch;
    overflow:hidden;
    white-space:nowrap;
    animation:typing 5s infinite alternate-reverse;
    border-right:3px solid #000;
}
@keyframes typing{
    from{
        width:0;
    }
}
#projects{
    text-align:center;
}
.box{
    border:1px solid grey;
    text-align:center;
    border-radius:15px;
    max-width:600px;
}
.link{
    display:inline-block;
    background:#2c3e50;
    color:#fff;
    padding:1rem;
    text-decoration:none;
}
.link:hover{
    color:#000;
}
form{
    border:1px solid;
    text-align:center;
    margin:2rem auto;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    background:#f4f4f9;
    padding:1rem;
}
input[type="text"], 
input[type="email"], 
textarea{
    width:250px;
    background:transparent;
    border-radius:15px;
    padding:5px;
   margin-bottom:10px;
}
input[type="submit"]{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid rgba(225,225, 225,0.5); 
    background:#2c3e50;
    color:#fff;
    cursor:pointer;
}
input[type="submit"]:hover{
    color:#000;
}
footer{
    text-align:center;
    border-1px solid;
    background:#2c3e50;
    color:#fff;
    padding:10px;
}
</style>
</head>
<body>
    <header>
        <h1>My portfolio</h1>
    </header>
    <nav>
        <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <section id="about">
        <h2>About me</h2>
        <p class="text">
            Im Andrew D. Potot a college student at cordova public college taking BSIT course
        </p>
    </section>
    <br><br><br><br>
    <section id="projects">
        <h2>My projects</h2>
        <div class="box">
            <a href="" class="link" target="_blank">Open site
            </a>
            <a href="" class="link" target="_blank">Open site</a>
        </div>
    </section>
    <br><br><br><br>
    <section id="contact">
        <form>
            <h2>
                Contact
            </h2>
            <input type="text" placeholder="Your name" required>
            <input type="email" placeholder="Your email" required>
            <textarea rows="4" placeholder="Send me a message"></textarea>
            <input type="submit" value="submit message">
        </form>
    </section>
    <br><br><br><br>
    <footer>
        <p>&copy;2026 | Portfolio Project</p>
    </footer>
</body>
